name: Deploy site to GitHub Pages

# Publishes docs/ (the interactive Protocol Explorer) to GitHub Pages.
# One-time setup: repo Settings → Pages → Build and deployment → Source: "GitHub Actions".
# After that, every push that touches docs/ redeploys the site automatically.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes cancel in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure Pages
        # enablement: true turns Pages on for the repo automatically (needs the
        # pages: write permission above), so no manual Settings step is required.
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
